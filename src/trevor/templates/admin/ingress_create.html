{% extends 'base.html' %}
{% block title %}New Ingress Request — trevor{% endblock %}
{% block content %}
<div class="page-header">
  <h1>New Ingress Request</h1>
  <p>Create an import request. External submitters will upload files via pre-signed URLs.</p>
</div>
<form method="post" action="/ui/requests/ingress">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <div class="form-group">
    <label for="project_id">Project</label>
    <select name="project_id" id="project_id" required>
      {% for p in projects %}
      <option value="{{ p.id }}">{{ p.display_name }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="form-group">
    <label for="title">Title</label>
    <input type="text" name="title" id="title" required placeholder="Brief description of incoming data">
  </div>
  <div class="form-group">
    <label for="description">Description</label>
    <textarea name="description" id="description" rows="3" placeholder="Provide context for this import request"></textarea>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Create Ingress Request</button>
    <a href="/ui/admin" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
