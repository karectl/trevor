apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: vdiinstances.karectl.io
spec:
  group: karectl.io
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              resource_type:
                type: string
                description: The type of resource (e.g., Jupyter, Keycloak, VDI).
                default: VDI
              name:
                type: string
                description: The requested name of the resource, used for identification
                  and management within the deployment.
              url:
                type: string
                description: Not used for VDI; VDI access is managed via the operator.
              enabled:
                type: boolean
                description: Boolean flag indicating whether the application or resource
                  is enabled and available for use.
              image:
                type: string
                description: Container image for the VDI.
              user:
                type: string
                description: Username for the VDI session.
              project:
                type: string
                description: Project this VDI belongs to.
              connection:
                type: string
                description: VDI connection protocols.
                enum:
                - rdp
                - vnc
              env:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Variable name.
                    value:
                      type: string
                      description: Variable value.
                  required:
                  - name
                  - value
                  additionalProperties: true
                description: Environment variables for the VDI container.
              scheduling:
                type: object
                properties:
                  resources:
                    type: object
                    properties:
                      requests_cpu:
                        type: string
                        description: CPU request
                      requests_memory:
                        type: string
                        description: Memory requests
                      limits_cpu:
                        type: string
                        description: CPU limit
                      limits_memory:
                        type: string
                        description: Memory limit
                    additionalProperties: true
                    description: CPU and memory resource requests/limits.
                additionalProperties: true
                description: Resource scheduling configuration for VDI.
              storage:
                type: object
                properties:
                  default_vdi_size:
                    type: string
                    description: Default PVC size for VDI workspaces.
                  default_notebook_size:
                    type: string
                    description: Default PVC size for notebook workspaces.
                  persist:
                    type: boolean
                    description: Whether workspace storage should persist across sessions.
                additionalProperties: true
                description: Storage configuration for VDI.
            required:
            - name
            - enabled
          status:
            type: object
            properties:
              phase:
                type: string
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                  required:
                  - type
                  - status
                  - reason
                  - message
              observedGeneration:
                type: integer
            additionalProperties: true
        required:
        - spec
    subresources:
      status: {}
  scope: Namespaced
  names:
    plural: vdiinstances
    singular: vdiinstance
    kind: VDIInstance
    shortNames:
    - vdi
