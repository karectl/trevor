apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: keycloakclients.identity.karectl.io
spec:
  group: identity.karectl.io
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              client_id:
                type: string
                description: Unique Keycloak client identifier.
              name:
                type: string
                description: client name shown in Keycloak admin console.
              secret:
                type: string
                description: Client secret.
              secret_ref:
                type: object
                properties:
                  name:
                    type: string
                    description: Secret name in the same namespace.
                  key:
                    type: string
                    description: Key within the Secret.
                required:
                - name
                additionalProperties: true
                description: Reference to a k8s Secret containing the client secret.
              enabled:
                type: boolean
                description: Whether the client is enabled.
              public_client:
                type: boolean
                description: Whether this is a public client.
              redirect_uris:
                type: array
                items:
                  type: string
                description: Valid redirect URIs after authentication.
              web_origins:
                type: array
                items:
                  type: string
                description: Allowed web origins for CORS.
              protocol:
                type: string
                description: Authentication protocol.
              default_client_scopes:
                type: array
                items:
                  type: string
                description: Default client scopes.
              optional_client_scopes:
                type: array
                items:
                  type: string
                description: Optional client scopes.
              protocol_mappers:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      description: Mapper name.
                    protocol_mapper:
                      type: string
                      description: Mapper type or class.
                    consent_required:
                      type: boolean
                    config:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                      description: Mapper configuration as JSON string.
                  required:
                  - name
                  - protocol_mapper
                  additionalProperties: true
                description: OIDC protocol mappers.
            required:
            - client_id
          status:
            type: object
            properties:
              phase:
                type: string
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                  required:
                  - type
                  - status
                  - reason
                  - message
              observedGeneration:
                type: integer
            additionalProperties: true
        required:
        - spec
    subresources:
      status: {}
  scope: Namespaced
  names:
    plural: keycloakclients
    singular: keycloakclient
    kind: KeycloakClient
    shortNames:
    - key
