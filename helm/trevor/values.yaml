# Default values for trevor.
# Production recommendations are annotated inline.

replicaCount: 2  # prod: 2+ for HA

image:
  repository: trevor
  pullPolicy: IfNotPresent
  tag: ""  # defaults to .Chart.AppVersion

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true  # creates ClusterRole + ClusterRoleBinding for CRD read access

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: trevor.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1000m"
    memory: "512Mi"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# ── Application config ───────────────────────────────────────────────────────
env:
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  DEV_AUTH_BYPASS: "false"
  OTEL_ENABLED: "false"
  OTEL_SERVICE_NAME: "trevor"
  MAX_UPLOAD_SIZE_MB: "500"
  STUCK_REQUEST_HOURS: "72"

# Secrets: mount these from Kubernetes Secrets (never put values here).
# Create secrets externally and reference them below.
envFromSecrets: []
# - secretName: trevor-db
#   keys: [DATABASE_URL]
# - secretName: trevor-redis
#   keys: [REDIS_URL]
# - secretName: trevor-keycloak
#   keys: [KEYCLOAK_URL, KEYCLOAK_REALM, KEYCLOAK_CLIENT_ID]
# - secretName: trevor-s3
#   keys: [S3_ENDPOINT_URL, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY, S3_QUARANTINE_BUCKET, S3_RELEASE_BUCKET]
# - secretName: trevor-app
#   keys: [SECRET_KEY]
# - secretName: trevor-agent
#   keys: [AGENT_OPENAI_BASE_URL, AGENT_MODEL_NAME, AGENT_API_KEY]

# ── ARQ worker ────────────────────────────────────────────────────────────────
worker:
  enabled: true
  replicaCount: 1  # prod: scale horizontally for throughput; each worker is safe to run in parallel
  command: ["arq", "trevor.worker.WorkerSettings"]
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

# ── OpenTelemetry collector ───────────────────────────────────────────────────
# Set OTEL_ENABLED=true and OTEL_EXPORTER_OTLP_ENDPOINT in env when deploying
# an OTel collector (e.g. opentelemetry-collector sub-chart or Grafana Alloy).

# ── Redis (sub-chart placeholder) ─────────────────────────────────────────────
redis:
  enabled: false  # use an external Redis in prod; enable for local testing only

# ── PostgreSQL (sub-chart placeholder) ────────────────────────────────────────
postgresql:
  enabled: false  # use an external PG in prod; enable for local testing only

# ── Migrations ────────────────────────────────────────────────────────────────
migrations:
  enabled: false       # init container migration (dev/Tilt)
  hookEnabled: true    # Helm pre-upgrade hook Job migration (recommended for prod)

# ── Network policy ────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  ingressNamespace: "ingress-nginx"
  monitoringNamespace: "monitoring"
