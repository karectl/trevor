{% extends 'base.html' %}
{% block title %}New Request — trevor{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Create Request</h1>
  <p>Create a new airlock request for output release</p>
</div>

<div class="card">
  {% if errors %}
  <div class="flash flash-error" role="alert">
    {% for e in errors %}<p>{{ e }}</p>{% endfor %}
  </div>
  {% endif %}

  <form method="post" action="/ui/requests">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-row">
      <div class="form-group">
        <label for="project_id">Project</label>
        <select name="project_id" id="project_id" required>
          {% for p in projects %}
          <option value="{{ p.id }}"{% if form and form.project_id == p.id|string %} selected{% endif %}>{{ p.display_name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="direction">Direction</label>
        <select name="direction" id="direction">
          <option value="egress"{% if not form or form.direction == 'egress' %} selected{% endif %}>Egress</option>
          <option value="ingress"{% if form and form.direction == 'ingress' %} selected{% endif %}>Ingress</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label for="title">Title <span class="required-mark">*</span></label>
      <input type="text" name="title" id="title" required
             placeholder="Brief description of outputs"
             value="{{ form.title if form else '' }}">
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea name="description" id="description"
                placeholder="What these outputs contain and why they need release">{{ form.description if form else '' }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Create Request</button>
      <a href="/ui/requests" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
