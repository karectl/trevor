# Master + Volume + Filer + S3 Gateway in one pod (dev only)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs
  namespace: trevor-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:latest
          args:
            - "server"
            - "-master"
            - "-volume"
            - "-filer"
            - "-s3"
            - "-s3.port=8333"
            - "-s3.config=/etc/seaweedfs/s3.json"
          ports:
            - containerPort: 9333  # master
            - containerPort: 8080  # volume
            - containerPort: 8888  # filer
            - containerPort: 8333  # s3 gateway
          volumeMounts:
            - name: s3-config
              mountPath: /etc/seaweedfs
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: s3-config
          configMap:
            name: seaweedfs-s3-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seaweedfs-s3-config
  namespace: trevor-dev
data:
  s3.json: |
    {
      "identities": [
        {
          "name": "dev",
          "credentials": [
            {
              "accessKey": "devaccess",
              "secretKey": "devsecret"
            }
          ],
          "actions": ["Admin", "Read", "Write", "List", "Tagging"]
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: trevor-dev
spec:
  selector:
    app: seaweedfs
  ports:
    - name: s3
      port: 8333
      targetPort: 8333
    - name: master
      port: 9333
      targetPort: 9333
    - name: filer
      port: 8888
      targetPort: 8888
