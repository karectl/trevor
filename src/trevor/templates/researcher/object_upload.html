{% extends 'base.html' %}
{% block title %}Upload Object — trevor{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Upload Object</h1>
  <p>Add an output object to <a href="/ui/requests/{{ request_id }}">{{ request_title }}</a></p>
</div>

<div class="card">
  <form method="post" action="/ui/requests/{{ request_id }}/upload" enctype="multipart/form-data">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="form-group">
      <label for="file">File</label>
      <input type="file" name="file" id="file" required>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="output_type">Output Type</label>
        <select name="output_type" id="output_type" required>
          <option value="tabular">Tabular</option>
          <option value="figure">Figure</option>
          <option value="code">Code</option>
          <option value="report">Report</option>
          <option value="model">Model</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="statbarn">Statbarn category</label>
        <input type="text" name="statbarn" id="statbarn" placeholder="Optional">
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Upload</button>
  </form>
</div>
{% endblock %}
