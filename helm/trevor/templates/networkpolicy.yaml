{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "trevor.fullname" . }}
  labels:
    {{- include "trevor.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "trevor.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - port: 8000
          protocol: TCP
    # Allow traffic from Prometheus scraper
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace | default "monitoring" }}
      ports:
        - port: 8000
          protocol: TCP
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow PostgreSQL
    - to:
        - podSelector:
            matchLabels: {}
      ports:
        - port: 5432
          protocol: TCP
    # Allow Redis
    - to:
        - podSelector:
            matchLabels: {}
      ports:
        - port: 6379
          protocol: TCP
    # Allow S3 (SeaweedFS / external)
    - to:
        - podSelector:
            matchLabels: {}
      ports:
        - port: 8333
          protocol: TCP
        - port: 443
          protocol: TCP
    # Allow Keycloak
    - to:
        - podSelector:
            matchLabels: {}
      ports:
        - port: 8080
          protocol: TCP
    # Allow OTel collector
    - to:
        - podSelector:
            matchLabels: {}
      ports:
        - port: 4317
          protocol: TCP
{{- end }}
