apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: projects.research.karectl.io
spec:
  group: research.karectl.io
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              description:
                type: string
                description: Project description / slug.
              display_name:
                type: string
                description: Human-readable project name shown in the UI.
              resources:
                type: array
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                description: Resources (applications/services) available in this project.
              limit_range:
                type: object
                properties:
                  default_memory:
                    type: string
                    description: Default memory limit (e.g. 4Gi).
                  default_cpu:
                    type: string
                    description: Default CPU limit (e.g. 500m).
                  default_request_memory:
                    type: string
                    description: Default memory request (e.g. 1Gi).
                  default_request_cpu:
                    type: string
                    description: Default CPU request (e.g. 100m).
                additionalProperties: true
                description: Default container resource limits for the project namespace.
            required:
            - description
          status:
            type: object
            properties:
              phase:
                type: string
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                  required:
                  - type
                  - status
                  - reason
                  - message
              observedGeneration:
                type: integer
            additionalProperties: true
        required:
        - spec
    subresources:
      status: {}
  scope: Namespaced
  names:
    plural: projects
    singular: project
    kind: Project
    shortNames:
    - pro
