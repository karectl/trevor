{% if total_pages > 1 %}
<div class="pagination">
  {% if page > 1 %}
  <a href="{{ base_url }}?page={{ page - 1 }}{% for k, v in filter_params.items() %}&{{ k }}={{ v }}{% endfor %}">Prev</a>
  {% endif %}
  {% for p in range(1, total_pages + 1) %}
    {% if p == page %}
    <span class="current">{{ p }}</span>
    {% else %}
    <a href="{{ base_url }}?page={{ p }}{% for k, v in filter_params.items() %}&{{ k }}={{ v }}{% endfor %}">{{ p }}</a>
    {% endif %}
  {% endfor %}
  {% if page < total_pages %}
  <a href="{{ base_url }}?page={{ page + 1 }}{% for k, v in filter_params.items() %}&{{ k }}={{ v }}{% endfor %}">Next</a>
  {% endif %}
</div>
{% endif %}
