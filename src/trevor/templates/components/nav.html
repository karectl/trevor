<nav class="topnav">
  <span class="brand">trevor</span>
  <div class="nav-links">
    <a href="/ui/requests">Requests</a>
    {% if is_checker %}
    <a href="/ui/review">Review Queue</a>
    {% endif %}
    {% if is_admin %}
    <a href="/ui/admin">Admin</a>
    <a href="/ui/admin/metrics">Metrics</a>
    <a href="/ui/admin/audit">Audit</a>
    {% endif %}
  </div>

  <span class="user-info">
    <span
      id="notif-badge-wrap"
      data-on-load="$$get('/notifications/unread-count')"
      data-on-interval__1000ms="$$get('/notifications/unread-count')"
    >
      <a href="/ui/notifications" class="notif-bell" aria-label="Notifications">

        <span
          id="notif-count"

          data-show="$count > 0"
